<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라온제나 독서통장</title>
  <!-- Google Fonts: Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
          },
        },
      },
    }
  </script>
  <link rel='stylesheet' href='./style.css'>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen overflow-x-hidden">
  <!-- Main Application Root -->
  <app-root></app-root>

  <!-- Chatbot Widget -->
  <div id="chatbot-widget" class="fixed bottom-6 right-6 z-[9999]">
    <button id="chatbot-toggle" class="w-14 h-14 bg-brand-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition-transform">
      💬
    </button>
    <div id="chatbot-window" class="hidden absolute bottom-20 right-0 w-[350px] h-[500px] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-scale-in border border-slate-100">
      <div class="p-4 bg-brand-600 text-white flex justify-between items-center">
        <h3 class="font-bold">라온제나 AI 도우미</h3>
        <button id="chatbot-close" class="text-white/80 hover:text-white">✕</button>
      </div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm bg-slate-50">
        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 max-w-[80%]">
          안녕하세요! 독서 활동에 대해 궁금한 점이 있으면 물어보세요. ✨
        </div>
      </div>
      <div class="p-4 bg-white border-t border-slate-100 flex gap-2">
        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." class="flex-1 p-3 bg-slate-50 rounded-xl outline-none text-sm focus:border-brand-500 border-2 border-transparent transition-all">
        <button id="chat-send" class="px-4 py-2 bg-brand-600 text-white rounded-xl font-bold text-sm">보내기</button>
      </div>
    </div>
  </div>
  
  <script defer type="module" src="./main.js"></script>
</body>
</html>
